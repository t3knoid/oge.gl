# fly.toml app configuration file generated for oge-gl on 2026-07-15T22:23:53-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'oge-gl'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'python -m alembic upgrade head'

[env]
  API_HOST = '0.0.0.0'
  API_PORT = '8000'
  PDF_STORAGE_DIR = '/data/pdfs'

[processes]
  app = 'uvicorn app.main:app --host 0.0.0.0 --port 8000'
  worker = 'python -m app.workers.runner'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
